server {
    listen 80;
    server_name _;
    client_max_body_size 10m;

    location = / { return 302 /smtp/; }
    location = /smtp { return 302 /smtp/; }
    location /smtp/ {
        proxy_pass http://smtp:18430/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    location = /grok { return 302 /grok/; }
    location /grok/ {
        proxy_pass http://grok:18425/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_set_header Accept-Encoding "";
        sub_filter_once on;
        sub_filter_types text/html application/javascript text/javascript;
        sub_filter "if (p === '/grok' || p.startsWith('/grok/')) return '/grok';" "if (p === '/grok' || p.startsWith('/grok/')) return '/grok';";
    }
}
